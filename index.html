<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brick Co LEGO – Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow:    #FFD700;
      --yellow-dk: #F5C400;
      --red:       #E3000B;
      --blue:      #006DB7;
      --blue-lt:   #E8F4FF;
      --dark:      #1A1A2E;
      --mid:       #2D2D44;
      --surface:   #FFFFFF;
      --surface2:  #F7F8FC;
      --border:    #E6E8F0;
      --text:      #1A1A2E;
      --text-muted:#6B7280;
      --radius:    16px;
      --shadow:    0 4px 24px rgba(0,0,0,.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.14);
      --ig:        #E1306C;
      --fb:        #1877F2;
      --line:      #06C755;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--surface2);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark);
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,.3);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .logo-brick {
      width: 44px; height: 44px;
      background: var(--yellow);
      border-radius: 10px;
      display: grid;
      place-items: center;
      position: relative;
      box-shadow: 0 3px 0 #c9a800, inset 0 1px 0 rgba(255,255,255,.4);
    }
    .logo-brick::before, .logo-brick::after {
      content: '';
      position: absolute;
      top: -8px;
      width: 14px; height: 8px;
      background: var(--yellow);
      border-radius: 4px 4px 0 0;
      box-shadow: 0 -2px 0 #c9a800;
    }
    .logo-brick::before { left: 6px; }
    .logo-brick::after  { right: 6px; }
    .logo-brick svg { width: 22px; height: 22px; }
    .logo-text { line-height: 1; }
    .logo-text .brand { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; color: var(--yellow); letter-spacing: 1px; font-weight: 900; text-transform: uppercase; }
    .logo-text .sub    { font-size: .7rem; font-weight: 700; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: 1.5px; }

    .header-search {
      flex: 1; max-width: 480px;
      position: relative;
    }
    .header-search input {
      width: 100%;
      padding: 10px 16px 10px 44px;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.08);
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      outline: none;
    }
    .header-search input::placeholder { color: rgba(255,255,255,.4); }
    .header-search input:focus {
      border-color: var(--yellow);
      background: rgba(255,255,255,.12);
    }
    .header-search .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.4);
      pointer-events: none;
    }

    /* ── HERO STRIP ── */
    .hero {
      background: linear-gradient(135deg, var(--red) 0%, #B8000A 100%);
      padding: 32px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='8' fill='none' stroke='rgba(255,255,255,.06)' stroke-width='2'/%3E%3C/svg%3E") repeat;
    }
    .hero h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; font-size: clamp(1.8rem, 4vw, 2.8rem); color: #fff; position: relative; }
    .hero p { color: rgba(255,255,255,.8); font-size: .95rem; font-weight: 600; margin-top: 6px; position: relative; }

    /* ── CONTROLS ── */
    .controls {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .filter-tabs { display: flex; gap: 8px; }
    .filter-tab {
      padding: 8px 20px;
      border-radius: 50px;
      border: 2px solid var(--border);
      background: var(--surface);
      font-family: 'Barlow', sans-serif;
      font-size: .875rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      color: var(--text-muted);
    }
    .filter-tab:hover { border-color: var(--blue); color: var(--blue); }
    .filter-tab.active { background: var(--dark); border-color: var(--dark); color: #fff; }
    .filter-tab.active.avail { background: #059669; border-color: #059669; }
    .filter-tab.active.sold  { background: var(--red); border-color: var(--red); }

    .stats { font-size: .875rem; font-weight: 700; color: var(--text-muted); }
    .stats span { color: var(--dark); }

    /* ── GRID ── */
    .grid-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
      position: relative;
      animation: fadeUp .4s ease both;
    }
    .card:hover { transform: translateY(-6px) scale(1.01); box-shadow: var(--shadow-lg); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-img {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      position: relative;
    }
    .card-img img {
      width: 100%; max-width: 180px;
      height: 160px;
      object-fit: contain;
      transition: transform .3s ease;
    }
    .card:hover .card-img img { transform: scale(1.06); }

    .sold-overlay {
      position: absolute; inset: 0;
      background: rgba(255,255,255,.6);
      backdrop-filter: blur(2px);
      display: flex; align-items: center; justify-content: center;
    }
    .sold-stamp {
      background: var(--red);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.4rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 22px;
      border-radius: 6px;
      transform: rotate(-8deg);
      box-shadow: 0 4px 12px rgba(227,0,11,.4);
    }

    .card-body { padding: 14px 16px 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .card-num  { font-size: .72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }
    .card-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: var(--dark); line-height: 1.25; flex: 1; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 50px;
      font-size: .75rem; font-weight: 800;
      width: fit-content;
      margin-top: 4px;
    }
    .badge-avail { background: #DCFCE7; color: #166534; }
    .badge-sold  { background: #FEE2E2; color: #991B1B; }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; }
    .badge-avail .badge-dot { background: #22C55E; animation: pulse 1.8s infinite; }
    .badge-sold  .badge-dot { background: #EF4444; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .4; }
    }

    /* ── EMPTY / LOADING ── */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .state-msg .icon { font-size: 3rem; margin-bottom: 12px; }
    .state-msg h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 6px; color: var(--dark); }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid var(--border);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FLOATING CONTACT ── */
    .float-btns {
      position: fixed;
      bottom: 28px; right: 24px;
      display: flex; flex-direction: column; gap: 12px;
      z-index: 200;
    }
    .float-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
      position: relative;
    }
    .float-btn:hover { transform: scale(1.15) translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }
    .float-btn svg { width: 26px; height: 26px; fill: #fff; }
    .float-btn .tooltip {
      position: absolute; right: 62px; top: 50%; transform: translateY(-50%);
      background: var(--dark); color: #fff;
      font-size: .78rem; font-weight: 700;
      padding: 5px 12px; border-radius: 6px;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity .2s;
    }
    .float-btn .tooltip::after {
      content: '';
      position: absolute; right: -6px; top: 50%; transform: translateY(-50%);
      border: 6px solid transparent;
      border-right: none;
      border-left-color: var(--dark);
    }
    .float-btn:hover .tooltip { opacity: 1; }
    .btn-ig   { background: linear-gradient(135deg, #F58529, #DD2A7B, #8134AF); }
    .btn-fb   { background: var(--fb); }
    .btn-line { background: var(--line); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 40px 24px;
      font-size: .8rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .header-inner { height: 60px; }
      .logo-text .brand { font-size: 1.2rem; }
      .header-search { max-width: none; }
      .hero { padding: 24px 16px; }
      .controls { flex-direction: column; align-items: flex-start; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
      .card-img { min-height: 140px; }
      .float-btn { width: 46px; height: 46px; }
      .float-btn svg { width: 22px; height: 22px; }
    }
  </style>
</head>

<script>
  const SHEET_ID = '16nuvshe86YG9ahtfPUA6fjilMXxjupjTgODvjzZEves';
  const CSV_DIRECT = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
  const CSV_PROXY  = `https://corsproxy.io/?url=${encodeURIComponent(CSV_DIRECT)}`;
  const IMG_BASE = ''; // replaced by multi-source fallback

  let allProducts = [];
  let activeFilter = 'all';
  let searchQuery  = '';

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    return lines.slice(1).map(line => {
      // Handle quoted commas
      const cols = [];
      let cur = '', inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else cur += ch;
      }
      cols.push(cur.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = (cols[i] || '').replace(/^"|"$/g, '').trim());
      return obj;
    }).filter(r => r['LEGO#'] || r['Name']);
  }

  function getImgSources(legoNum) {
    const n = encodeURIComponent(legoNum);
    return [
      // Brickset — most reliable, no CORS header needed for <img> tags
      `https://images.brickset.com/sets/images/${legoNum}-1.jpg`,
      `https://images.brickset.com/sets/small/${legoNum}-1.jpg`,
      // Rebrickable direct (works when server allows cross-origin img)
      `https://cdn.rebrickable.com/media/sets/${legoNum}-1.jpg`,
      // Rebrickable via proxy fallback
      `https://corsproxy.io/?url=https%3A%2F%2Fcdn.rebrickable.com%2Fmedia%2Fsets%2F${n}-1.jpg`,
    ];
  }

  function renderCard(p, idx) {
    const legoNum = p['LEGO#'] || '';
    const name    = p['Name']   || 'Unknown Set';
    const status  = (p['Status'] || '').toLowerCase();
    const sold    = status === 'sold';
    const sources = getImgSources(legoNum);
    const sourcesEncoded = btoa(JSON.stringify(sources));
    const firstSrc = sources[0];

    return `
      <div class="card" style="animation-delay:${idx * 40}ms">
        <div class="card-img">
          <img src="${firstSrc}" alt="${name}" loading="lazy"
               referrerpolicy="no-referrer"
               data-sources="${sourcesEncoded}" data-src-idx="0"
               onerror="imgFallback(this)">
          ${sold ? `<div class="sold-overlay"><div class="sold-stamp">SOLD OUT</div></div>` : ''}
        </div>
        <div class="card-body">
          <div class="card-num">Set #${legoNum}</div>
          <div class="card-name">${name}</div>
          <div class="badge ${sold ? 'badge-sold' : 'badge-avail'}">
            <div class="badge-dot"></div>
            ${sold ? 'Sold Out' : 'Available'}
          </div>
        </div>
      </div>`;
  }

  function imgFallback(img) {
    try {
      const sources = JSON.parse(atob(img.dataset.sources || btoa('[]')));
      let idx = parseInt(img.dataset.srcIdx || '0') + 1;
      if (idx < sources.length) {
        img.dataset.srcIdx = idx;
        img.onerror = () => imgFallback(img);
        img.src = sources[idx];
      } else {
        img.onerror = null;
        img.src = `data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120"><rect width="120" height="120" rx="12" fill="#e8eaf0"/><text x="60" y="72" text-anchor="middle" font-size="48">🧱</text></svg>')}`;
      }
    } catch(e) { img.onerror = null; }
  }

  function render() {
    const q = searchQuery.toLowerCase();
    const filtered = allProducts.filter(p => {
      const matchSearch = !q ||
        (p['Name']   || '').toLowerCase().includes(q) ||
        (p['LEGO#']  || '').toLowerCase().includes(q);
      const status = (p['Status'] || '').toLowerCase();
      const sold   = status === 'sold';
      const matchFilter =
        activeFilter === 'all' ? true :
        activeFilter === 'sold' ? sold :
        !sold;
      return matchSearch && matchFilter;
    });

    document.getElementById('countShown').textContent = filtered.length;
    document.getElementById('countTotal').textContent = allProducts.length;

    const grid = document.getElementById('grid');
    if (!filtered.length) {
      grid.innerHTML = `<div class="state-msg"><div class="icon">🔍</div><h3>No sets found</h3><p>Try a different search or filter</p></div>`;
      return;
    }
    grid.innerHTML = filtered.map((p, i) => renderCard(p, i)).join('');
  }

  async function loadData() {
    try {
      let res, text;
      // Try direct first (works on GitHub Pages after redirect)
      try {
        res = await fetch(CSV_DIRECT, { redirect: 'follow' });
        if (!res.ok) throw new Error('direct failed');
        text = await res.text();
        if (!text.includes(',')) throw new Error('not csv');
      } catch {
        // Fallback to CORS proxy
        res  = await fetch(CSV_PROXY);
        text = await res.text();
      }
      allProducts = parseCSV(text);
      render();
    } catch (e) {
      document.getElementById('grid').innerHTML = `
        <div class="state-msg">
          <div class="icon">⚠️</div>
          <h3>Failed to load inventory</h3>
          <p>Please check your connection and refresh the page.</p>
        </div>`;
    }
  }

  // Events
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });

  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  loadData();
</script>
</body>
</html>
